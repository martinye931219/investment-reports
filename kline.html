<script>
let chartData = {}; let klineChart, ddChart;
fetch("kline_chart_data.json").then(r => r.json()).then(d => {
  chartData = d;

  const fc = Object.keys(d)[0]; if (fc) { document.getElementById("stockSelect").value = fc; loadStock(fc); }
});
function loadStock(code) {
  const d = chartData[code]; if (!d) return;
  let range = parseInt(document.getElementById("rangeSelect").value);
  let dates=d.dates, ohlc=d.ohlc, ma55=d.ma55, ma60=d.ma60, ma65=d.ma65, dd=d.drawdown;
  if (range > 0 && dates.length > range) { const s=dates.length-range; dates=dates.slice(s); ohlc=ohlc.slice(s); ma55=ma55.slice(s); ma60=ma60.slice(s); ma65=ma65.slice(s); dd=dd.slice(s); }

  ddChart.setOption({backgroundColor:"#161b22", tooltip:{trigger:"axis"}, grid:{left:60,right:20,top:10,bottom:30}, xAxis:{type:"category",data:dates,axisLabel:{color:"#8b949e",rotate:45}}, yAxis:{type:"value",axisLabel:{color:"#8b949e",formatter:"{value}%"}}, series:[{name:"回撤",type:"line",data:dd,symbol:"none",areaStyle:{color:"rgba(248,81,73,0.15)"},lineStyle:{color:"#f85149",width:1},markPoint:{data:[{type:"max",name:"最大回撤",itemStyle:{color:"#f85149"}}]}}]});

}

function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    return Math.abs(hash).toString(16).padStart(32, '0').substring(0, 32);
}

function checkPassword() {
    const input = document.getElementById('authPassword').value;
    const hash = simpleHash(input);
    if (hash === AUTH_HASH) {
        localStorage.setItem(AUTH_KEY, 'true');
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    } else {
        document.getElementById('authError').style.display = 'block';
        document.getElementById('authPassword').value = '';
    }
}

// 检查是否已认证
if (localStorage.getItem(AUTH_KEY) === 'true') {
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
}

// 回车提交
document.getElementById('authPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
});
</script>
